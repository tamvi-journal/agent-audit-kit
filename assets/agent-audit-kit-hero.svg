<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Audit Kit trust-boundary pipeline</title>
  <desc id="desc">A task passes through preflight, worker execution, guard, evidence verification, and release gate before becoming an approved candidate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101820"/>
      <stop offset="0.55" stop-color="#183B3D"/>
      <stop offset="1" stop-color="#F2B84B"/>
    </linearGradient>
    <linearGradient id="panel" x1="84" y1="80" x2="1116" y2="550" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#E9F5F2" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="softShadow" x="40" y="38" width="1120" height="552" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0B1418" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 535C170 491 271 555 424 512C595 464 659 348 832 360C987 371 1091 462 1200 423V630H0V535Z" fill="#F8FAFC" fill-opacity="0.12"/>
  <path d="M0 120C143 162 260 135 394 100C559 57 742 38 923 76C1054 104 1139 154 1200 182V0H0V120Z" fill="#0B1418" fill-opacity="0.18"/>

  <g filter="url(#softShadow)">
    <rect x="70" y="78" width="1060" height="474" rx="28" fill="url(#panel)"/>
  </g>

  <text x="122" y="150" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="800" letter-spacing="0">Agent Audit Kit</text>
  <text x="124" y="194" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="500">Preflight before execution. Evidence verified before release.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <g transform="translate(110 270)">
      <rect width="126" height="96" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="63" y="43" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">Task</text>
      <text x="63" y="68" text-anchor="middle" fill="#64748B" font-size="13">envelope</text>
    </g>
    <g transform="translate(277 270)">
      <rect width="126" height="96" rx="18" fill="#113C47"/>
      <text x="63" y="43" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="800">Preflight</text>
      <text x="63" y="68" text-anchor="middle" fill="#BFE7E2" font-size="13">can run?</text>
    </g>
    <g transform="translate(444 270)">
      <rect width="126" height="96" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="63" y="43" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">Worker</text>
      <text x="63" y="68" text-anchor="middle" fill="#64748B" font-size="13">candidate</text>
    </g>
    <g transform="translate(611 270)">
      <rect width="126" height="96" rx="18" fill="#0E766E"/>
      <text x="63" y="43" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800">Guard</text>
      <text x="63" y="68" text-anchor="middle" fill="#D6FFF8" font-size="13">scan</text>
    </g>
    <g transform="translate(778 270)">
      <rect width="150" height="96" rx="18" fill="#F2B84B"/>
      <text x="75" y="39" text-anchor="middle" fill="#241A05" font-size="17" font-weight="800">Evidence</text>
      <text x="75" y="63" text-anchor="middle" fill="#5D4308" font-size="13">verification</text>
    </g>
    <g transform="translate(969 270)">
      <rect width="126" height="96" rx="18" fill="#244C5A"/>
      <text x="63" y="43" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="800">Release</text>
      <text x="63" y="68" text-anchor="middle" fill="#C8E7EF" font-size="13">gate</text>
    </g>
  </g>

  <g stroke="#94A3B8" stroke-width="3" stroke-linecap="round">
    <path d="M236 318H264"/>
    <path d="M403 318H431"/>
    <path d="M570 318H598"/>
    <path d="M737 318H765"/>
    <path d="M928 318H956"/>
  </g>

  <text x="122" y="460" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="27" font-weight="800">Worker-reported evidence is a claim, not proof.</text>
  <text x="122" y="499" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="500">Approved under configured checks; not proven true.</text>
  <rect x="835" y="454" width="260" height="52" rx="26" fill="#113C47"/>
  <text x="965" y="488" text-anchor="middle" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800">eligible for release</text>
</svg>
